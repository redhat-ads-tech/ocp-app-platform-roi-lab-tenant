apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .Values.tenant.username }}-parasol-insurance
  namespace: {{ .Values.argocd.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: {{ .Values.argocd.namespace }}
    server: https://kubernetes.default.svc
  project: default
  source:
    path: parasol-insurance-tenant
    repoURL: {{ .Values.gitops.repoURL }}
    targetRevision: {{ .Values.gitops.targetRevision }}
    helm:
      valuesObject:
        tenant:
          username: {{ .Values.tenant.username }}
        gitlab:
          host: {{ .Values.gitlab.host }}
        registry:
          host: {{ .Values.registry.host }}
        cluster:
          subdomain: {{ .Values.cluster.subdomain }}
        vault:
          name: {{ .Values.vault.name }}
          namespace: {{ .Values.vault.namespace }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 2m0s
      limit: 30
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
