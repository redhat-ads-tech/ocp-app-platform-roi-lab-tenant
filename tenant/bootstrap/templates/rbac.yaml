{{- $username := .Values.tenant.username -}}
{{- range $ns := list
  (printf "%s-build" $username)
  (printf "%s-dev" $username)
  (printf "%s-prod" $username)
}}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $username }}-tenant
  namespace: {{ $ns }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tenant-user
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: User
    name: {{ $username }}
{{- end }}
