apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: {{ .Values.tenant.username }}
  namespace: {{ .Values.argocd.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: "Tenant project for {{ .Values.tenant.username }}"
  sourceRepos:
    - '*'
  destinations:
    - namespace: {{ .Values.tenant.username }}-build
      server: https://kubernetes.default.svc
    - namespace: {{ .Values.tenant.username }}-dev
      server: https://kubernetes.default.svc
    - namespace: {{ .Values.tenant.username }}-prod
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
